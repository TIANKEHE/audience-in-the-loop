<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代纸张玻璃效果</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f3e1d4, #d7d9eb);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .content-wrapper {
            width: 90%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: start;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow-y: scroll;
            padding: 20px;
            grid-template-rows: 1fr;
            grid-template-columns: repeat(3, 1fr);
        }
        .textbox {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            backdrop-filter: blur(15px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex: 1;
            min-width: 250px;
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="textbox">文本框 1</div>
        <div class="textbox">文本框 2</div>
        <div class="textbox">文本框 3</div>
    </div>
</body>
</html>
